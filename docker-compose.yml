version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    container_name: api-versioning
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Service de test (utilisé en CI)
  test:
    build:
      context: .
      target: builder
    container_name: api-versioning-test
    command: npm test
    environment:
      - NODE_ENV=test
    profiles:
      - test
