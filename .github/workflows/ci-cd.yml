name: CI/CD — API Versioning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: api-versioning-api
  CONTAINER_NAME: api-versioning

jobs:
  # ─── Job 1 : Tests & Lint ────────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm test

      - name: Rapport de couverture (optionnel)
        run: npm run test:coverage --if-present

  # ─── Job 2 : Build Docker ─────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image Docker
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Smoke test du conteneur
        run: |
          docker run -d --name smoke-test -p 3000:3000 $IMAGE_NAME:latest
          sleep 5
          curl --fail http://localhost:3000/health || (docker logs smoke-test && exit 1)
          docker stop smoke-test && docker rm smoke-test

  # ─── Job 3 : Push sur Docker Hub (sur main uniquement) ───────────────────
  push:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4 : Déploiement (sur main uniquement) ───────────────────────────
  deploy:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/api-versioning

            # Pull de la nouvelle image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Redémarrage avec zero-downtime
            docker compose pull
            docker compose up -d --remove-orphans

            # Vérification santé post-déploiement
            sleep 5
            curl --fail http://localhost:3000/health || exit 1

            echo "Déploiement réussi — $(date)"

      - name: Notification succès
        if: success()
        run: echo "Déploiement en production réussi pour le commit ${{ github.sha }}"

      - name: Notification échec
        if: failure()
        run: echo "Échec du déploiement — rollback nécessaire"
